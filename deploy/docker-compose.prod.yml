services:
  app:
    container_name: ${PROJECT_NAME:-esports-mood-tracker}-app
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      PORT: ${APP_PORT:-5000}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:${MONGO_PORT:-27017}/${MONGO_DATABASE}?authSource=admin
    ports:
      - "${APP_PORT:-5000}:${APP_PORT:-5000}"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - app-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-5000}/health-check >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongo:
    container_name: ${PROJECT_NAME:-esports-mood-tracker}-mongo
    image: mongo:7
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo-data:/data/db
    expose:
      - "${MONGO_PORT:-27017}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mongo-data:
  app-uploads:
